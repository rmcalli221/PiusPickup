<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pius Pickup League</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
/* ── TOKENS ── */
:root {
  --bg:       #0a0d14;
  --court:    #0d1120;
  --surf:     #111827;
  --surf2:    #1a2236;
  --surf3:    #1f2a40;
  --border:   #243048;
  --bord2:    #2e3d5c;

  --orange:   #f5d020;   /* yellow */
  --orange2:  #ffe45e;   /* lighter yellow */
  --cream:    #ffffff;   /* white */
  --chalk:    #c8d4e8;   /* light blue-white */
  --win:      #4ade80;
  --loss:     #f87171;

  --text:     #ffffff;
  --muted:    #3d5070;
  --subtle:   #6b82a8;

  --r: 6px;
  --fd: 'Barlow Condensed', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --fb: 'Inter', sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--fb);font-size:15px;line-height:1.5;
  min-height:100vh;
}

/* ── COURT LINES (signature element) ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(ellipse 320px 180px at 50% -20px, transparent 95%, rgba(245,208,32,.07) 95%, rgba(245,208,32,.07) 100%, transparent 100%),
    linear-gradient(90deg, rgba(245,208,32,.03) 1px, transparent 1px),
    linear-gradient(rgba(245,208,32,.03) 1px, transparent 1px);
  background-size:100% 100%, 60px 60px, 60px 60px;
  opacity:1;
}

/* subtle navy grain texture */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(
    92deg,
    transparent,
    transparent 38px,
    rgba(245,208,32,.012) 38px,
    rgba(245,208,32,.012) 40px
  );
}

/* ── LAYOUT ── */
#app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding-bottom:100px}

/* ── HEADER ── */
header{
  padding:32px 20px 20px;
  border-bottom:3px solid var(--orange);
  margin-bottom:0;
}
.league-eyebrow{
  font-family:var(--fm);font-size:10px;letter-spacing:3px;
  color:var(--orange);text-transform:uppercase;margin-bottom:4px;
}
.league-name-pius{
  font-family:var(--fd);font-size:clamp(90px,20vw,140px);
  font-weight:900;line-height:.85;letter-spacing:-2px;
  text-transform:uppercase;color:var(--orange);
  display:block;
}
.league-name-sub{
  font-family:var(--fd);font-size:clamp(22px,5vw,34px);
  font-weight:700;line-height:1;letter-spacing:6px;
  text-transform:uppercase;color:var(--chalk);
  display:block;margin-top:4px;
}
.header-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:12px;
}
#status-bar{display:flex;align-items:center;gap:7px;font-family:var(--fm);font-size:10px;color:var(--muted)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.season-badge{font-family:var(--fm);font-size:10px;letter-spacing:2px;color:var(--muted)}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:20;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;padding:0 20px;gap:0;
  overflow-x:auto;scrollbar-width:none;
}
nav::-webkit-scrollbar{display:none}
nav button{
  font-family:var(--fd);font-size:15px;letter-spacing:2px;font-weight:700;
  text-transform:uppercase;background:none;border:none;cursor:pointer;
  color:var(--muted);padding:14px 16px;
  border-bottom:3px solid transparent;
  transition:color .15s,border-color .15s;white-space:nowrap;
}
nav button:hover{color:var(--chalk)}
nav button.active{color:var(--orange);border-bottom-color:var(--orange)}
nav button.admin-btn.active{color:var(--loss);border-bottom-color:var(--loss)}

/* ── SECTIONS ── */
.section{display:none;padding:24px 20px}
.section.active{display:block;animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.sec-title{font-family:var(--fd);font-size:38px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;line-height:1}
.sec-sub{font-family:var(--fm);font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:22px}

/* ── CARDS ── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.card+.card{margin-top:12px}

/* ── FORM ── */
label.fl{display:block;font-family:var(--fm);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
select,input[type="text"],input[type="number"],input[type="date"],input[type="password"]{
  width:100%;background:var(--surf2);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);font-family:var(--fb);
  font-size:15px;padding:10px 13px;outline:none;appearance:none;
  transition:border-color .2s;
}
select:focus,input:focus{border-color:var(--orange)}
select option{background:var(--surf2)}
.fg{margin-bottom:15px}

/* ── BUTTONS ── */
.btn{
  border:none;border-radius:var(--r);cursor:pointer;
  font-family:var(--fd);font-size:19px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;padding:13px 24px;
  transition:transform .15s,opacity .15s;
}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn:active{transform:none}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-primary{background:var(--orange);color:#0e0e0e;width:100%}
.btn-danger{background:var(--loss);color:#0e0e0e;width:100%}
.btn-ghost{
  background:none;border:1px solid var(--bord2);color:var(--subtle);
  font-family:var(--fm);font-size:11px;letter-spacing:1px;
  padding:7px 14px;border-radius:var(--r);cursor:pointer;
  transition:all .15s;
}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}

/* ── GAME CARD (games list) ── */
.game-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  margin-bottom:10px;overflow:hidden;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.game-card:hover{border-color:var(--bord2);background:var(--surf2)}
.game-card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
}
.game-date{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:1px}
.game-score-display{display:flex;align-items:center;gap:12px}
.team-score-chip{
  display:flex;flex-direction:column;align-items:center;
  min-width:52px;
}
.tsc-label{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.tsc-score{font-family:var(--fd);font-size:32px;font-weight:800;line-height:1}
.tsc-score.winner{color:var(--orange)}
.score-dash{font-family:var(--fd);font-size:24px;color:var(--muted);font-weight:700}
.game-players-preview{
  font-family:var(--fm);font-size:10px;color:var(--muted);
  padding:0 18px 12px;letter-spacing:.5px;
}

/* ── BOX SCORE MODAL ── */
#modal-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.85);
  align-items:flex-start;justify-content:center;
  padding:24px 16px;overflow-y:auto;
}
#modal-overlay.open{display:flex}
#modal-box{
  background:var(--surf);border:1px solid var(--bord2);border-radius:var(--r);
  width:100%;max-width:640px;overflow:hidden;
  animation:fadeUp .2s ease;
}
.modal-head{
  background:var(--surf2);padding:18px 20px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.modal-title{font-family:var(--fd);font-size:26px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.modal-date{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:1px}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}

/* box score teams */
.bs-teams{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:480px){.bs-teams{grid-template-columns:1fr}}
.bs-team{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.bs-team-head{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.bs-team-label{font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.bs-team-total{font-family:var(--fd);font-size:28px;font-weight:900}
.bs-team-total.winner{color:var(--orange)}
.bs-win-badge{font-family:var(--fm);font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:3px;background:rgba(245,208,32,.18);color:var(--orange)}
.bs-player-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;
}
.bs-player-row:last-child{border-bottom:none}
.bs-pts{font-family:var(--fm);font-size:13px;font-weight:500}
.bs-notes{font-family:var(--fm);font-size:10px;color:var(--muted);padding:10px 14px;letter-spacing:.5px}

/* ── STANDINGS TABLE ── */
.standings-table{width:100%;border-collapse:collapse}
.standings-table th{
  font-family:var(--fm);font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);font-weight:500;padding:8px 12px;
  text-align:left;border-bottom:2px solid var(--border);
}
.standings-table th.r{text-align:right}
.standings-table td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
.standings-table tbody tr:last-child td{border-bottom:none}
.standings-table tbody tr{cursor:pointer;transition:background .12s}
.standings-table tbody tr:hover{background:var(--surf2)}
.rank-cell{font-family:var(--fm);color:var(--muted);font-size:12px;width:32px}
.rank-1c{color:var(--orange)}
.player-name-cell{font-weight:600}
.wl-cell{font-family:var(--fm);font-size:13px}
.w{color:var(--win)}.l{color:var(--loss)}
.ppg-cell{font-family:var(--fm);font-size:14px;font-weight:500;text-align:right}
.gp-cell{font-family:var(--fm);font-size:12px;color:var(--muted);text-align:right}
.pct-bar-wrap{width:60px;height:5px;background:var(--surf3);border-radius:3px;display:inline-block;vertical-align:middle;margin-left:8px}
.pct-bar-fill{height:100%;border-radius:3px;background:var(--orange)}

/* ── PLAYER MODAL ── */
.player-game-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;
}
.player-game-row:last-child{border-bottom:none}
.pgr-date{font-family:var(--fm);font-size:11px;color:var(--muted)}
.pgr-result{font-family:var(--fm);font-size:11px;padding:2px 8px;border-radius:3px;font-weight:500}
.pgr-w{background:rgba(74,222,128,.12);color:var(--win)}
.pgr-l{background:rgba(248,113,113,.12);color:var(--loss)}
.pgr-pts{font-family:var(--fm);font-size:14px;font-weight:500}
.pgr-opp{font-size:12px;color:var(--subtle)}

/* ── SORT CONTROLS ── */
.sort-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.sort-btn{
  font-family:var(--fm);font-size:10px;letter-spacing:1px;
  background:var(--surf2);border:1px solid var(--border);
  color:var(--muted);padding:6px 12px;border-radius:4px;cursor:pointer;
  transition:all .15s;
}
.sort-btn:hover{color:var(--text);border-color:var(--bord2)}
.sort-btn.active{background:var(--orange);color:#0e0e0e;border-color:var(--orange)}

/* ── ADMIN: player roster builder ── */
.roster-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.roster-side{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.roster-side-title{
  font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:10px;
}
.roster-side-title.a{color:var(--orange)}
.roster-side-title.b{color:var(--chalk)}
.player-chip{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surf3);border:1px solid var(--border);
  border-radius:4px;padding:6px 10px;margin-bottom:6px;
  font-size:13px;
}
.player-chip input[type=number]{
  width:60px;background:var(--surf);border:1px solid var(--border);
  border-radius:4px;color:var(--text);font-family:var(--fm);
  font-size:13px;padding:4px 8px;outline:none;
}
.player-chip input[type=number]:focus{border-color:var(--orange)}
.remove-chip{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px;line-height:1}
.remove-chip:hover{color:var(--loss)}
.add-player-row{display:flex;gap:8px;margin-top:8px}
.add-player-row select{flex:1}

/* ── ADMIN SECTION ── */
.admin-block{margin-bottom:28px}
.admin-block-title{
  font-family:var(--fm);font-size:10px;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
#admin-lock{text-align:center;padding:48px 20px}
#admin-lock p{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:20px}
.lock-form{max-width:260px;margin:0 auto}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--surf2);border:1px solid var(--orange);
  color:var(--orange);font-family:var(--fm);font-size:11px;
  letter-spacing:1px;padding:11px 24px;border-radius:40px;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index:300;white-space:nowrap;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--loss);color:var(--loss)}

/* ── MISC ── */
.empty{text-align:center;padding:48px 20px;font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:1px}
.empty-icon{font-size:36px;margin-bottom:10px}
.stat-chips{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-chip{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;flex:1;min-width:100px}
.stat-chip-val{font-family:var(--fd);font-size:32px;font-weight:800;color:var(--orange)}
.stat-chip-label{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:2px}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="league-eyebrow">Est. 2026 · Weekly Run</div>
    <span class="league-name-pius">Pius</span>
    <span class="league-name-sub">Pickup League</span>
    <div class="header-meta">
      <div id="status-bar"><div class="dot"></div><span id="status-txt">Connecting…</span></div>
      <div class="season-badge" id="game-count-badge"></div>
    </div>
  </header>

  <nav>
    <button class="active" onclick="showTab('games')">Games</button>
    <button onclick="showTab('standings')">Standings</button>
    <button onclick="showTab('players')">Players</button>
    <button class="admin-btn" onclick="showTab('admin')">Admin</button>
  </nav>

  <!-- GAMES -->
  <div id="tab-games" class="section active">
    <div class="sec-title">Games</div>
    <div class="sec-sub">FULL BOX SCORES</div>
    <div id="games-list"></div>
  </div>

  <!-- STANDINGS -->
  <div id="tab-standings" class="section">
    <div class="sec-title">Standings</div>
    <div class="sec-sub">INDIVIDUAL RECORDS</div>
    <div class="sort-row">
      <button class="sort-btn active" onclick="setSort('ppg')">PPG</button>
      <button class="sort-btn" onclick="setSort('wins')">Wins</button>
      <button class="sort-btn" onclick="setSort('pct')">Win %</button>
      <button class="sort-btn" onclick="setSort('gp')">Games</button>
      <button class="sort-btn" onclick="setSort('name')">Name</button>
    </div>
    <div id="standings-content"></div>
  </div>

  <!-- PLAYERS -->
  <div id="tab-players" class="section">
    <div class="sec-title">Players</div>
    <div class="sec-sub">GAME-BY-GAME HISTORY</div>
    <div class="fg">
      <label class="fl">Select Player</label>
      <select id="player-lookup" onchange="renderPlayerDetail()">
        <option value="">— choose a player —</option>
      </select>
    </div>
    <div id="player-detail"></div>
  </div>

  <!-- ADMIN -->
  <div id="tab-admin" class="section">
    <div class="sec-title" style="color:var(--loss)">Admin</div>
    <div class="sec-sub">ENTER GAME RESULTS</div>

    <div id="admin-lock">
      <p>ADMIN ACCESS REQUIRED</p>
      <div class="lock-form">
        <div class="fg"><input type="password" id="admin-pw" placeholder="password" onkeydown="if(event.key==='Enter')checkPw()"></div>
        <button class="btn btn-danger" onclick="checkPw()">Unlock</button>
      </div>
    </div>

    <div id="admin-panel" style="display:none">

      <div class="admin-block">
        <div class="admin-block-title">New Game Entry</div>
        <div class="card">

          <div class="fg">
            <label class="fl">Game Date</label>
            <input type="date" id="game-date">
          </div>
          <div class="fg">
            <label class="fl">Notes (optional — e.g. "gym 2, overtime")</label>
            <input type="text" id="game-notes" placeholder="Optional notes about this game">
          </div>

          <div class="roster-grid">
            <!-- Team A -->
            <div class="roster-side">
              <div class="roster-side-title a">Team A</div>
              <div id="teamA-chips"></div>
              <div class="add-player-row">
                <select id="addA-sel"><option value="">+ add player</option></select>
                <button class="btn-ghost" onclick="addPlayerToTeam('A')">Add</button>
              </div>
            </div>
            <!-- Team B -->
            <div class="roster-side">
              <div class="roster-side-title b">Team B</div>
              <div id="teamB-chips"></div>
              <div class="add-player-row">
                <select id="addB-sel"><option value="">+ add player</option></select>
                <button class="btn-ghost" onclick="addPlayerToTeam('B')">Add</button>
              </div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
            <div>
              <label class="fl">Team A Total</label>
              <div id="teamA-total" style="font-family:var(--fm);font-size:28px;font-weight:700;color:var(--orange);padding:8px 0">0</div>
            </div>
            <div>
              <label class="fl">Team B Total</label>
              <div id="teamB-total" style="font-family:var(--fm);font-size:28px;font-weight:700;color:var(--chalk);padding:8px 0">0</div>
            </div>
          </div>

          <button class="btn btn-primary" onclick="saveGame()">Save Game</button>
        </div>
      </div>

      <div class="admin-block">
        <div class="admin-block-title">Manage Roster</div>
        <div class="card">
          <div class="fg">
            <label class="fl">Add New Player to League</label>
            <div style="display:flex;gap:8px">
              <input type="text" id="new-player-name" placeholder="Player name" style="flex:1">
              <button class="btn-ghost" onclick="addNewPlayer()">Add</button>
            </div>
          </div>
          <div id="roster-list" style="margin-top:8px"></div>
        </div>
      </div>

      <div class="admin-block">
        <div class="admin-block-title">Delete a Game</div>
        <div class="card">
          <div class="fg">
            <label class="fl">Select Game</label>
            <select id="del-game-sel"></select>
          </div>
          <button class="btn btn-danger" onclick="deleteGame()">Delete Game</button>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- BOX SCORE MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="modal-title">Box Score</div>
        <div class="modal-date" id="modal-date"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// FIREBASE CONFIG
// Reuse your existing Firebase project — just
// add a 'games' and 'roster' collection alongside
// your existing MapTap collections.
// ═══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const ADMIN_PASSWORD = "pius2024";  // ← change this

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let allGames  = [];   // [{id, date, notes, teamA:[{name,pts}], teamB:[{name,pts}], scoreA, scoreB}]
let allRoster = [];   // [{id, name}]  — all registered players
let sortBy    = 'ppg';

// In-progress admin entry
let entryA = [];  // [{name, pts}]
let entryB = [];

// ═══════════════════════════════════════════════
// DATE / FORMAT HELPERS
// ═══════════════════════════════════════════════
function pad(n){ return String(n).padStart(2,'0'); }
function today(){
  const d=new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fmtDate(ds){
  if(!ds) return '';
  const [y,m,d]=ds.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric',year:'numeric'});
}
function fmtShort(ds){
  if(!ds) return '';
  const [y,m,d]=ds.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function setStatus(msg){ document.getElementById('status-txt').textContent=msg; }

// ═══════════════════════════════════════════════
// FIREBASE LISTENERS
// ═══════════════════════════════════════════════
function startListeners(){
  // Games — ordered by date desc
  db.collection('ppl_games').orderBy('date','desc').onSnapshot(snap=>{
    allGames=[];
    snap.forEach(doc=>{
      const d=doc.data();
      allGames.push({id:doc.id,...d});
    });
    setStatus(`Updated ${new Date().toLocaleTimeString()}`);
    document.getElementById('game-count-badge').textContent=`${allGames.length} game${allGames.length!==1?'s':''}`;
    const tab=activeTab();
    if(tab==='games')     renderGames();
    if(tab==='standings') renderStandings();
    if(tab==='players')   { renderPlayerSelect(); renderPlayerDetail(); }
    refreshAdminGameSelect();
  }, err=>{setStatus('Connection error');console.error(err);});

  // Roster
  db.collection('ppl_roster').orderBy('name').onSnapshot(snap=>{
    allRoster=[];
    snap.forEach(doc=>allRoster.push({id:doc.id,...doc.data()}));
    renderRosterList();
    refreshPlayerSelects();
    renderPlayerSelect();
  }, err=>console.error(err));
}

function activeTab(){
  return document.querySelector('.section.active')?.id?.replace('tab-','')||'';
}

// ═══════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════
function showTab(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelector(`nav button[onclick="showTab('${name}')"]`).classList.add('active');
  if(name==='games')     renderGames();
  if(name==='standings') renderStandings();
  if(name==='players')   { renderPlayerSelect(); renderPlayerDetail(); }
}

// ═══════════════════════════════════════════════
// RENDER: GAMES LIST
// ═══════════════════════════════════════════════
function renderGames(){
  if(!allGames.length){
    document.getElementById('games-list').innerHTML=`<div class="empty"><div class="empty-icon">🏀</div>No games recorded yet</div>`;
    return;
  }
  const html=allGames.map(g=>{
    const winA=g.scoreA>g.scoreB;
    const winB=g.scoreB>g.scoreA;
    const previewA=g.teamA.slice(0,3).map(p=>p.name).join(', ')+(g.teamA.length>3?` +${g.teamA.length-3}`:'');
    const previewB=g.teamB.slice(0,3).map(p=>p.name).join(', ')+(g.teamB.length>3?` +${g.teamB.length-3}`:'');
    return `<div class="game-card" onclick="openModal('${g.id}')">
      <div class="game-card-head">
        <div class="game-date">${fmtShort(g.date)}</div>
        <div class="game-score-display">
          <div class="team-score-chip">
            <div class="tsc-label">Team A</div>
            <div class="tsc-score ${winA?'winner':''}">${g.scoreA}</div>
          </div>
          <div class="score-dash">–</div>
          <div class="team-score-chip">
            <div class="tsc-score ${winB?'winner':''}">${g.scoreB}</div>
            <div class="tsc-label">Team B</div>
          </div>
        </div>
      </div>
      <div class="game-players-preview">${previewA} &nbsp;·&nbsp; ${previewB}</div>
    </div>`;
  }).join('');
  document.getElementById('games-list').innerHTML=html;
}

// ═══════════════════════════════════════════════
// BOX SCORE MODAL
// ═══════════════════════════════════════════════
function openModal(gameId){
  const g=allGames.find(x=>x.id===gameId);
  if(!g) return;
  const winA=g.scoreA>g.scoreB, winB=g.scoreB>g.scoreA;

  const teamRows=(players)=>players
    .slice().sort((a,b)=>b.pts-a.pts)
    .map(p=>`<div class="bs-player-row"><span>${p.name}</span><span class="bs-pts">${p.pts}</span></div>`)
    .join('');

  document.getElementById('modal-title').textContent='Box Score';
  document.getElementById('modal-date').textContent=fmtDate(g.date).toUpperCase();
  document.getElementById('modal-body').innerHTML=`
    <div class="bs-teams">
      <div class="bs-team">
        <div class="bs-team-head">
          <div>
            <div class="bs-team-label">Team A</div>
            ${winA?'<div class="bs-win-badge">WIN</div>':''}
          </div>
          <div class="bs-team-total ${winA?'winner':''}">${g.scoreA}</div>
        </div>
        ${teamRows(g.teamA)}
      </div>
      <div class="bs-team">
        <div class="bs-team-head">
          <div>
            <div class="bs-team-label">Team B</div>
            ${winB?'<div class="bs-win-badge">WIN</div>':''}
          </div>
          <div class="bs-team-total ${winB?'winner':''}">${g.scoreB}</div>
        </div>
        ${teamRows(g.teamB)}
      </div>
    </div>
    ${g.notes?`<div class="bs-notes" style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">📝 ${g.notes}</div>`:''}`;

  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e){
  if(e.target===document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modal-overlay').classList.remove('open');
}

// ═══════════════════════════════════════════════
// COMPUTE PLAYER STATS
// ═══════════════════════════════════════════════
function computeStats(){
  const stats={};
  allRoster.forEach(p=>{
    stats[p.name]={name:p.name,gp:0,wins:0,losses:0,totalPts:0};
  });
  allGames.forEach(g=>{
    const winA=g.scoreA>g.scoreB, winB=g.scoreB>g.scoreA;
    g.teamA.forEach(p=>{
      if(!stats[p.name]) stats[p.name]={name:p.name,gp:0,wins:0,losses:0,totalPts:0};
      stats[p.name].gp++;
      stats[p.name].totalPts+=p.pts;
      if(winA) stats[p.name].wins++; else if(winB) stats[p.name].losses++;
    });
    g.teamB.forEach(p=>{
      if(!stats[p.name]) stats[p.name]={name:p.name,gp:0,wins:0,losses:0,totalPts:0};
      stats[p.name].gp++;
      stats[p.name].totalPts+=p.pts;
      if(winB) stats[p.name].wins++; else if(winA) stats[p.name].losses++;
    });
  });
  return Object.values(stats).filter(s=>s.gp>0);
}

// ═══════════════════════════════════════════════
// RENDER: STANDINGS
// ═══════════════════════════════════════════════
function setSort(s){
  sortBy=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.sort-btn[onclick="setSort('${s}')"]`).classList.add('active');
  renderStandings();
}

function renderStandings(){
  const stats=computeStats();
  if(!stats.length){
    document.getElementById('standings-content').innerHTML=`<div class="empty"><div class="empty-icon">📊</div>No games yet</div>`;
    return;
  }

  const sorted=[...stats].sort((a,b)=>{
    if(sortBy==='ppg') return (b.totalPts/b.gp)-(a.totalPts/a.gp);
    if(sortBy==='wins') return b.wins-a.wins;
    if(sortBy==='pct') return (b.wins/b.gp)-(a.wins/a.gp);
    if(sortBy==='gp') return b.gp-a.gp;
    if(sortBy==='name') return a.name.localeCompare(b.name);
    return 0;
  });

  const maxPpg=Math.max(...sorted.map(s=>s.gp>0?s.totalPts/s.gp:0),1);

  // Summary chips
  const totalGames=allGames.length;
  const totalPlayers=sorted.length;
  const topScorer=sorted.slice().sort((a,b)=>(b.totalPts/b.gp)-(a.totalPts/a.gp))[0];

  const chips=`<div class="stat-chips">
    <div class="stat-chip"><div class="stat-chip-val">${totalGames}</div><div class="stat-chip-label">Games played</div></div>
    <div class="stat-chip"><div class="stat-chip-val">${totalPlayers}</div><div class="stat-chip-label">Players</div></div>
    <div class="stat-chip"><div class="stat-chip-val">${topScorer?(topScorer.totalPts/topScorer.gp).toFixed(1):'—'}</div><div class="stat-chip-label">Top PPG</div></div>
  </div>`;

  const rows=sorted.map((s,i)=>{
    const ppg=(s.totalPts/s.gp).toFixed(1);
    const pct=s.gp>0?((s.wins/s.gp)*100).toFixed(0):0;
    const barW=((s.totalPts/s.gp)/maxPpg*100).toFixed(1);
    return `<tr onclick="jumpToPlayer('${s.name}')">
      <td class="rank-cell ${i===0?'rank-1c':''}">${i+1}</td>
      <td class="player-name-cell">${s.name}</td>
      <td class="wl-cell"><span class="w">${s.wins}</span><span style="color:var(--muted)">–</span><span class="l">${s.losses}</span></td>
      <td class="gp-cell">${s.gp}</td>
      <td class="ppg-cell">
        ${ppg}
        <div class="pct-bar-wrap"><div class="pct-bar-fill" style="width:${barW}%"></div></div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('standings-content').innerHTML=chips+`
    <table class="standings-table">
      <thead><tr>
        <th>#</th><th>Player</th><th>W–L</th><th class="r">GP</th><th class="r">PPG</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ═══════════════════════════════════════════════
// RENDER: PLAYER DETAIL
// ═══════════════════════════════════════════════
function renderPlayerSelect(){
  const sel=document.getElementById('player-lookup');
  const cur=sel.value;
  const names=[...new Set([
    ...allRoster.map(p=>p.name),
    ...allGames.flatMap(g=>[...g.teamA,...g.teamB].map(p=>p.name))
  ])].sort();
  sel.innerHTML='<option value="">— choose a player —</option>'+names.map(n=>`<option value="${n}" ${n===cur?'selected':''}>${n}</option>`).join('');
}

function jumpToPlayer(name){
  showTab('players');
  document.getElementById('player-lookup').value=name;
  renderPlayerDetail();
}

function renderPlayerDetail(){
  const name=document.getElementById('player-lookup').value;
  const el=document.getElementById('player-detail');
  if(!name){el.innerHTML='';return;}

  const games=allGames.filter(g=>[...g.teamA,...g.teamB].some(p=>p.name===name))
    .sort((a,b)=>b.date.localeCompare(a.date));

  if(!games.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🏀</div>${name} has no recorded games</div>`;
    return;
  }

  let wins=0,losses=0,totalPts=0;
  const rows=games.map(g=>{
    const onA=g.teamA.some(p=>p.name===name);
    const entry=[...g.teamA,...g.teamB].find(p=>p.name===name);
    const pts=entry?entry.pts:0;
    const myScore=onA?g.scoreA:g.scoreB;
    const oppScore=onA?g.scoreB:g.scoreA;
    const won=myScore>oppScore;
    if(won) wins++; else losses++;
    totalPts+=pts;
    return `<div class="player-game-row">
      <div>
        <div class="pgr-date">${fmtShort(g.date)}</div>
        <div class="pgr-opp">Team ${onA?'A':'B'} · ${myScore}–${oppScore}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="pgr-result ${won?'pgr-w':'pgr-l'}">${won?'W':'L'}</span>
        <span class="pgr-pts">${pts} pts</span>
      </div>
    </div>`;
  }).join('');

  const ppg=games.length?(totalPts/games.length).toFixed(1):'—';
  const pct=games.length?Math.round(wins/games.length*100):0;

  el.innerHTML=`
    <div class="stat-chips">
      <div class="stat-chip"><div class="stat-chip-val">${wins}–${losses}</div><div class="stat-chip-label">Record</div></div>
      <div class="stat-chip"><div class="stat-chip-val">${ppg}</div><div class="stat-chip-label">PPG</div></div>
      <div class="stat-chip"><div class="stat-chip-val">${pct}%</div><div class="stat-chip-label">Win rate</div></div>
    </div>
    <div class="card">${rows}</div>`;
}

// ═══════════════════════════════════════════════
// ADMIN — PASSWORD
// ═══════════════════════════════════════════════
function checkPw(){
  if(document.getElementById('admin-pw').value===ADMIN_PASSWORD){
    document.getElementById('admin-lock').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    document.getElementById('game-date').value=today();
    refreshPlayerSelects();
  } else {
    showToast('Incorrect password',true);
  }
}

// ═══════════════════════════════════════════════
// ADMIN — ROSTER MANAGEMENT
// ═══════════════════════════════════════════════
async function addNewPlayer(){
  const name=document.getElementById('new-player-name').value.trim();
  if(!name){showToast('Enter a name',true);return;}
  if(allRoster.some(p=>p.name.toLowerCase()===name.toLowerCase())){showToast('Player already exists',true);return;}
  try{
    await db.collection('ppl_roster').add({name});
    document.getElementById('new-player-name').value='';
    showToast(`✓ ${name} added to roster`);
  }catch(e){showToast('Error adding player',true);console.error(e);}
}

function renderRosterList(){
  const el=document.getElementById('roster-list');
  if(!el) return;
  if(!allRoster.length){el.innerHTML='<div style="font-family:var(--fm);font-size:11px;color:var(--muted)">No players yet</div>';return;}
  el.innerHTML=allRoster.map(p=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span>${p.name}</span>
      <button class="remove-chip" onclick="removePlayer('${p.id}','${p.name}')">✕</button>
    </div>`).join('');
}

async function removePlayer(id,name){
  if(!confirm(`Remove ${name} from the roster?`)) return;
  try{await db.collection('ppl_roster').doc(id).delete();showToast(`Removed ${name}`);}
  catch(e){showToast('Error removing',true);console.error(e);}
}

// ═══════════════════════════════════════════════
// ADMIN — GAME ENTRY
// ═══════════════════════════════════════════════
function refreshPlayerSelects(){
  const names=allRoster.map(p=>p.name).sort();
  ['addA-sel','addB-sel'].forEach(id=>{
    const sel=document.getElementById(id);
    if(!sel) return;
    sel.innerHTML='<option value="">+ add player</option>'+names.map(n=>`<option value="${n}">${n}</option>`).join('');
  });
}

function addPlayerToTeam(team){
  const selId=team==='A'?'addA-sel':'addB-sel';
  const name=document.getElementById(selId).value;
  if(!name) return;
  const entry=team==='A'?entryA:entryB;
  if(entry.some(p=>p.name===name)){showToast(`${name} already on Team ${team}`,true);return;}
  // Also prevent adding to both teams
  const other=team==='A'?entryB:entryA;
  if(other.some(p=>p.name===name)){showToast(`${name} is already on the other team`,true);return;}
  entry.push({name,pts:0});
  renderTeamChips();
}

function removeFromTeam(team,name){
  if(team==='A') entryA=entryA.filter(p=>p.name!==name);
  else           entryB=entryB.filter(p=>p.name!==name);
  renderTeamChips();
}

function updatePts(team,name,val){
  const entry=team==='A'?entryA:entryB;
  const p=entry.find(x=>x.name===name);
  if(p) p.pts=parseInt(val)||0;
  updateTotals();
}

function renderTeamChips(){
  ['A','B'].forEach(team=>{
    const entry=team==='A'?entryA:entryB;
    document.getElementById(`team${team}-chips`).innerHTML=entry.map(p=>`
      <div class="player-chip">
        <span>${p.name}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" min="0" max="99" value="${p.pts}"
            oninput="updatePts('${team}','${p.name}',this.value)" placeholder="0">
          <button class="remove-chip" onclick="removeFromTeam('${team}','${p.name}')">✕</button>
        </div>
      </div>`).join('');
  });
  updateTotals();
}

function updateTotals(){
  document.getElementById('teamA-total').textContent=entryA.reduce((a,p)=>a+p.pts,0);
  document.getElementById('teamB-total').textContent=entryB.reduce((a,p)=>a+p.pts,0);
}

async function saveGame(){
  const date=document.getElementById('game-date').value;
  const notes=document.getElementById('game-notes').value.trim();
  if(!date){showToast('Pick a date',true);return;}
  if(entryA.length<1||entryB.length<1){showToast('Add at least one player per team',true);return;}
  const scoreA=entryA.reduce((a,p)=>a+p.pts,0);
  const scoreB=entryB.reduce((a,p)=>a+p.pts,0);
  if(scoreA===0&&scoreB===0){showToast('Enter some points first',true);return;}

  try{
    await db.collection('ppl_games').add({
      date, notes,
      teamA:entryA.map(p=>({name:p.name,pts:p.pts})),
      teamB:entryB.map(p=>({name:p.name,pts:p.pts})),
      scoreA, scoreB,
      ts: firebase.firestore.FieldValue.serverTimestamp()
    });
    entryA=[];entryB=[];
    renderTeamChips();
    document.getElementById('game-notes').value='';
    document.getElementById('game-date').value=today();
    showToast(`✓ Game saved — Team A ${scoreA}, Team B ${scoreB}`);
  }catch(e){showToast('Error saving game',true);console.error(e);}
}

function refreshAdminGameSelect(){
  const sel=document.getElementById('del-game-sel');
  if(!sel) return;
  sel.innerHTML='<option value="">— select game —</option>'+
    allGames.map(g=>`<option value="${g.id}">${fmtShort(g.date)} · A ${g.scoreA} – B ${g.scoreB}</option>`).join('');
}

async function deleteGame(){
  const id=document.getElementById('del-game-sel').value;
  if(!id){showToast('Select a game',true);return;}
  const g=allGames.find(x=>x.id===id);
  if(!confirm(`Delete game from ${fmtShort(g?.date)}?`)) return;
  try{
    await db.collection('ppl_games').doc(id).delete();
    showToast('Game deleted');
  }catch(e){showToast('Error deleting',true);console.error(e);}
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let _tt;
function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(err?' err':'');
  clearTimeout(_tt);_tt=setTimeout(()=>{t.className='';},2800);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  setStatus('Connecting…');
  startListeners();
}
init();
</script>
